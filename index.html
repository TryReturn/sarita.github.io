<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Sarita</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            font-family: 'Poppins', sans-serif;
        }

        .carta {
            width: 360px;
            height: 240px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.6s;
        }

        .carta:hover {
            transform: scale(1.05);
        }

        .tapa {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffb3c6, #fde2e4);
            clip-path: polygon(0 0, 100% 0, 50% 65%);
            transform-origin: top;
            transition: transform 1s ease;
            z-index: 2;
        }

        .carta.abierta .tapa {
            transform: rotateX(180deg);
        }

        .contenido {
            position: absolute;
            inset: 0;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 1.2s ease 0.6s;
        }

        .carta.abierta .contenido {
            opacity: 1;
        }

        .titulo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #d1495b;
        }

        .mensaje {
            font-size: 17px;
            color: #555;
            line-height: 1.5;
        }

        .firma {
            margin-top: 10px;
            font-size: 15px;
            color: #777;
            font-style: italic;
        }

        .indicacion {
            position: absolute;
            bottom: -48px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #444;
            animation: flotar 1.6s infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="carta" onclick="abrirCarta()">
        <div class="tapa"></div>

        <div class="contenido">
            <div class="titulo">Para mi Sarita</div>

            <div class="mensaje">
                Gracias por llegar a mi vida y quedarte.<br>
                Por escucharme, por entenderme y por estar<br>
                incluso cuando no sé cómo decir lo que siento.<br><br>
                Tenerte como amiga es un regalo que valoro mucho.
            </div>

            <div class="firma">
                Con mucho cariño, siempre.
            </div>
        </div>

        <div class="indicacion">
            Toca la carta con cuidado
        </div>
    </div>

    <script>
        function abrirCarta() {
            document.querySelector('.carta').classList.toggle('abierta');
        }
    </script>

</body>
</html>
